<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narayani Sales Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --accent: #00b894; --grad: linear-gradient(135deg, #00b894, #00cec9); --glass: rgba(255, 255, 255, 0.85); --wa: #25D366; }
        body { font-family: 'Outfit', sans-serif; background: #f0f3f7; color: #2d3436; padding-bottom: 120px; overflow-x: hidden; }
        .s-card { background: white; border-radius: 24px; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.04); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; position: relative; }
        .s-card:hover { transform: translateY(-5px) scale(1.01); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .blink-header { background: var(--glass); backdrop-filter: blur(15px); padding: 15px 20px; position: sticky; top:0; z-index:1000; border-bottom: 1px solid #e1e8ed; }
        .cat-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; }
        .cat-pill { padding: 8px 18px; background: white; border-radius: 50px; font-size: 0.85rem; font-weight: 500; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
        .cat-pill.active { background: var(--grad); color: white; border-color: transparent; }
        .qty-box { display: flex; align-items: center; justify-content: center; background: var(--accent); color: white; border-radius: 50px; padding: 2px 8px; width: fit-content; margin: 10px auto 0; }
        .qty-btn { background: none; border: none; color: white; font-weight: bold; padding: 0 8px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; background: #1e272e; border-radius: 35px; display: flex; justify-content: space-around; padding: 14px; z-index: 2000; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .nav-item { text-align: center; color: #808e9b; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
        .nav-item i { display: block; font-size: 1.5rem; margin-bottom: 3px; }
        .nav-item.active { color: white; transform: translateY(-3px); }
        #toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: #2d3436; color: white; padding: 12px 30px; border-radius: 50px; z-index: 4000; opacity: 0; pointer-events: none; transition: 0.4s; }
        .search-bar { background: #fff; border-radius: 50px; padding: 10px 20px; border: 1px solid #eee; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .hidden { display: none !important; }
        .out-of-stock { filter: grayscale(1); opacity: 0.6; }
        .stock-badge { position: absolute; top: 10px; right: 10px; background: #ff7675; color: white; font-size: 0.6rem; padding: 2px 8px; border-radius: 50px; }
        .wa-btn { background: var(--wa); color: white; border: none; border-radius: 50px; padding: 5px 15px; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
<div id="toast">Update Successful</div>
<div class="blink-header d-flex justify-content-between align-items-center">
    <div>
        <div class="fw-bold fs-5" id="header-user-name">Guest</div>
        <div class="small text-muted" id="header-role">Welcome Back</div>
    </div>
    <div id="cart-pill" class="btn btn-dark rounded-pill px-4 py-2 animate__animated animate__bounceIn hidden" onclick="showPage('cart')">
        🛒 <span id="cart-count">0</span> Items
    </div>
</div>

<div class="container mt-3">
    <div id="search-container" class="hidden">
        <input type="text" id="p-search" class="form-control search-bar" placeholder="🔍 Search products..." onkeyup="filterProducts()">
    </div>

    <div id="page-login" class="animate__animated animate__fadeIn">
        <div class="s-card p-4 mx-auto mt-5" style="max-width: 400px; border-top: 5px solid var(--accent);">
            <h3 class="fw-bold mb-4">Narayani <span style="color:var(--accent)">Sales</span></h3>
            <input type="text" id="l-phone" class="form-control mb-3 py-2" placeholder="Phone Number">
            <input type="password" id="l-pass" class="form-control mb-4 py-2" placeholder="Password">
            <button class="btn btn-dark w-100 py-2 rounded-pill shadow" onclick="handleLogin()">Sign In</button>
        </div>
    </div>

    <div id="page-shop" class="page hidden animate__animated animate__fadeIn">
        <h6 class="fw-bold text-muted mb-2">Categories</h6>
        <div class="cat-scroll" id="cat-slider"></div>
        <div id="product-list-container" class="row g-3"></div>
    </div>

    <div id="page-orders" class="page hidden animate__animated animate__fadeIn">
        <h5 class="fw-bold mb-3">Order Tracking</h5>
        <div id="order-list"></div>
    </div>

    <div id="page-usermgmt" class="page hidden animate__animated animate__fadeIn">
        <div class="d-flex justify-content-between mb-3">
            <h5 class="fw-bold">User Directory</h5>
            <button class="btn btn-sm btn-dark rounded-pill" onclick="openUserModal()">+ Create</button>
        </div>
        <div id="user-directory-list"></div>
    </div>

    <div id="page-profile" class="page hidden animate__animated animate__fadeIn">
        <div class="s-card p-4 mb-3 text-center">
            <div class="mx-auto bg-light rounded-circle mb-2" style="width:80px; height:80px; display:flex; align-items:center; justify-content:center; font-size:2rem">👤</div>
            <h5 class="fw-bold mb-0" id="prof-name">Name</h5>
            <p class="small text-muted mb-3" id="prof-sub"></p>
            <hr>
            <div class="text-start small">
                <p><b>Shop:</b> <span id="prof-shop"></span></p>
                <p><b>Address:</b> <span id="prof-addr"></span></p>
                <p><b>Phone:</b> <span id="prof-phone"></span></p>
            </div>
            <button class="btn btn-outline-danger btn-sm w-100 rounded-pill mt-2" onclick="logout()">Sign Out</button>
        </div>

        <div id="bank-details-box" class="s-card p-4 mb-3 hidden text-start">
            <h6 class="fw-bold mb-3">Company Bank Details</h6>
            <div class="small" id="bank-info-display"></div>
        </div>

        <div id="admin-tools" class="hidden">
            <div class="s-card p-3 border-start border-5 border-success mb-3">
                <h6 class="fw-bold mb-3">Admin Panel</h6>
                <button class="btn btn-success btn-sm w-100 mb-2 rounded-pill" onclick="openProductModal()">Add New Product</button>
                <button class="btn btn-warning btn-sm w-100 rounded-pill" onclick="openSettingsModal()">App Settings</button>
            </div>
        </div>
    </div>

    <div id="page-cart" class="page hidden animate__animated animate__slideInUp">
        <div class="s-card p-4">
            <h5 class="fw-bold mb-3">Checkout</h5>
            <div id="cart-items" class="mb-3"></div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <span class="text-muted">Total Payable:</span>
                <h2 class="fw-bold text-success m-0">₹<span id="cart-total">0</span></h2>
            </div>
            <button class="btn btn-success w-100 py-3 rounded-pill mb-2 fw-bold" onclick="placeOrder('UPI')">Place Order</button>
        </div>
    </div>
</div>

<div id="bottom-nav" class="bottom-nav hidden">
    <div class="nav-item active" id="nav-shop" onclick="showPage('shop', this)"><i>🏠</i>Home</div>
    <div class="nav-item" onclick="showPage('orders', this)"><i>📦</i>Orders</div>
    <div class="nav-item" id="nav-users-tab" onclick="showPage('usermgmt', this)"><i>👥</i>Users</div>
    <div class="nav-item" onclick="showPage('profile', this)"><i>👤</i>Profile</div>
</div>

<div id="modal-product" class="position-fixed top-50 start-50 translate-middle s-card p-4 hidden animate__animated animate__zoomIn" style="z-index:3000; width:92%; max-width:400px;">
    <h6 class="fw-bold mb-3">Product Info</h6>
    <input type="hidden" id="adm-p-id">
    <input type="text" id="adm-p-name" class="form-control mb-2" placeholder="Product Name">
    <input type="number" id="adm-p-price" class="form-control mb-2" placeholder="Buying Price">
    <input type="number" id="adm-p-saleprice" class="form-control mb-2" placeholder="Sale Price (MRP)">
    <input type="text" id="adm-p-img" class="form-control mb-2" placeholder="Image URL">
    <select id="adm-p-status" class="form-select mb-3">
        <option value="Live">Live</option>
        <option value="Out of Stock">Out of Stock</option>
    </select>
    <button class="btn btn-success w-100 rounded-pill mb-2" onclick="saveProduct()">Save</button>
    <button class="btn btn-light w-100 rounded-pill" onclick="closeModals()">Cancel</button>
</div>

<div id="modal-user" class="position-fixed top-50 start-50 translate-middle s-card p-4 hidden animate__animated animate__zoomIn" style="z-index:3000; width:92%; max-width:400px;">
    <h6 class="fw-bold mb-3">User Record</h6>
    <input type="hidden" id="adm-u-oldphone">
    <input type="text" id="adm-u-phone" class="form-control mb-2" placeholder="Phone">
    <input type="text" id="adm-u-name" class="form-control mb-2" placeholder="Name">
    <select id="adm-u-role" class="form-select mb-2">
        <option value="User">Customer</option>
        <option value="Agent">Agent</option>
        <option value="Admin">Admin</option>
    </select>
    <input type="text" id="adm-u-loc" class="form-control mb-2" placeholder="Location URL">
    <button class="btn btn-success w-100 rounded-pill mb-2" onclick="saveUser()">Save</button>
    <button class="btn btn-light w-100 rounded-pill" onclick="closeModals()">Close</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwNCWkpX2s90DNb0O1URT325b2litQF2ivaL7V2o-rqTDv-QJPVsWCcsacO5QAxdTnn/exec";
    let state = { 
        user: JSON.parse(localStorage.getItem('narayani_u_v4')), 
        cart: [], products: [], orders: [], allUsers: [], selectedCat: 'All', settings: {}
    };

    async function call(action, data = {}) {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
        return await res.json();
    }
    
    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0,3000); }

    window.onload = () => { if(state.user) startSession(); };

    async function handleLogin() {
        const res = await call('login', { phone: document.getElementById('l-phone').value, password: document.getElementById('l-pass').value });
        if(res.success) { localStorage.setItem('narayani_u_v4', JSON.stringify(res)); state.user = res; location.reload(); }
        else showToast("Invalid login.");
    }

    function startSession() {
        document.getElementById('page-login').classList.add('hidden');
        document.getElementById('bottom-nav').classList.remove('hidden');
        document.getElementById('header-user-name').innerText = state.user.name;
        document.getElementById('header-role').innerText = state.user.role;
        
        // Admin Only Users Tab
        if(state.user.role !== 'Admin') document.getElementById('nav-users-tab').classList.add('hidden');
        if(state.user.role === 'Admin') document.getElementById('admin-tools').classList.remove('hidden');
        
        showPage('shop');
        loadData();
    }

    async function loadData() {
        const [p, u, s, o] = await Promise.all([
            call('getProducts', {role: state.user.role}), 
            call('allUsers'),
            call('getSettings'),
            call('getOrders', {role: state.user.role, phone: state.user.phone})
        ]);
        state.products = p.products; state.allUsers = u.users; state.settings = s; state.orders = o.orders;
        renderCats(p.categories); renderProducts(); renderOrders();
    }

    function renderCats(cats) {
        const slider = document.getElementById('cat-slider');
        slider.innerHTML = `<div class="cat-pill active" onclick="filterByCat('All')">All</div>` + 
            cats.map(c => `<div class="cat-pill" onclick="filterByCat('${c}')">${c}</div>`).join('');
    }

    function renderProducts() {
        const container = document.getElementById('product-list-container');
        container.innerHTML = state.products.map(p => {
            const isOut = p[8] === 'Out of Stock';
            const margin = p[6] || 0;
            return `
                <div class="col-6">
                    <div class="s-card p-2 h-100 ${isOut ? 'out-of-stock' : ''}" onclick="${state.user.role === 'Admin' ? `openEditProd('${p[0]}')` : ''}">
                        ${isOut ? '<span class="stock-badge">Sold Out</span>' : ''}
                        <img src="${p[4]}" class="w-100 rounded-3 mb-2" style="height:120px; object-fit:cover">
                        <div class="fw-bold small text-truncate">${p[2]}</div>
                        <div class="text-success fw-bold">₹${p[5]}</div>
                        <div class="text-muted" style="font-size:0.65rem">You Save: ₹${margin}</div>
                        ${!isOut ? `<button class="btn btn-dark btn-sm w-100 rounded-pill mt-2 py-1" onclick="addToCart('${p[0]}')">Add</button>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderOrders() {
        const container = document.getElementById('order-list');
        container.innerHTML = state.orders.map(o => `
            <div class="s-card p-3 mb-3 text-start">
                <div class="d-flex justify-content-between">
                    <span class="small fw-bold">ID: ${o[0].toString().slice(-6)}</span>
                    <span class="badge bg-secondary">${o[5]}</span>
                </div>
                <hr class="my-2">
                <div class="small">Total: <b>₹${o[3]}</b></div>
                <div class="d-flex gap-2 mt-2">
                    <button class="btn btn-light btn-sm rounded-pill" onclick="copyLocation('${o[15]}')">📍 Copy Location</button>
                    <button class="wa-btn" onclick="shareBill('${o[0]}')">Share Bill</button>
                </div>
            </div>
        `).join('');
    }

    function copyLocation(url) {
        if(!url) return showToast("No location link");
        navigator.clipboard.writeText(url).then(() => showToast("Location Copied!"));
    }

    function shareBill(orderId) {
        const order = state.orders.find(o => o[0] == orderId);
        if(!order) return;
        const cart = JSON.parse(order[2]);
        let itemsText = cart.map(i => `• ${i.name} (x${i.qty}) - ₹${i.price * i.qty}`).join('%0A');
        
        const message = `*NARAYANI SALES - BILL*%0A%0A` +
            `Customer: ${order[11]}%0A` +
            `Order ID: ${orderId}%0A` +
            `--------------------------%0A` +
            `${itemsText}%0A` +
            `--------------------------%0A` +
            `Subtotal: ₹${order[10]}%0A` +
            `Platform Fee: ₹${order[9]}%0A` +
            `*Total Payable: ₹${order[3]}*%0A%0A` +
            `Thank you for shopping!`;
        
        window.open(`https://wa.me/91${order[14]}?text=${message}`);
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + id).classList.remove('hidden');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    }

    // Helper functions for remaining buttons
    function openEditProd(id) {
        const p = state.products.find(x => x[0] == id);
        document.getElementById('adm-p-id').value = p[0];
        document.getElementById('adm-p-name').value = p[2];
        document.getElementById('adm-p-price').value = p[3];
        document.getElementById('adm-p-saleprice').value = p[5];
        document.getElementById('adm-p-img').value = p[4];
        document.getElementById('adm-p-status').value = p[8];
        document.getElementById('modal-product').classList.remove('hidden');
    }

    function closeModals() { document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden')); }
    
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
